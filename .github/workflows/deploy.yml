name: Deploy API to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/build_api.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build per-PLZ API files
        run: python3 scripts/build_api.py

      - name: Add GitHub Pages files
        run: touch api/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: api

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
