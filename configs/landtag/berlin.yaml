# Berlin — Abgeordnetenhaus
# WK boundaries reconstructed from Ortsteile polygons (WFS) + official PDF mapping.
state: berlin
state_name: Berlin
parliament: Abgeordnetenhaus
method: spatial
period_id: 133
expected_wk_count: 78
election: Berlin 2026

sources:
  - "Landeswahlleiter Berlin / Amt für Statistik Berlin-Brandenburg (CC-BY)"
  - "GDI Berlin ALKIS Ortsteile WFS (dl-de/zero-2-0)"
  - "yetzt/postleitzahlen — PLZ boundary polygons (ODbL)"

download:
  mode: auto
  strategy: berlin_ortsteile
  url: "https://gdi.berlin.de/services/wfs/alkis?service=WFS&version=2.0.0&request=GetFeature&typeNames=alkis:ortsteile&outputFormat=application/json&srsName=EPSG:25832"
  pdf_url: "https://www.wahlen-berlin.de/Wahlen/Be2023/Wahlkreiseinteil/Wahlkreise/Wahlkreisverbandkarte_2023_05.pdf"
  mapping_template: "configs/landtag/berlin_ortsteil_wahlkreis.csv"
  checksum_sha256: ""
  format: geojson
  raw_subdir: berlin
  source_file: "wahlkreise.geojson"
  expected_files:
    - "wahlkreise.geojson"
    - "ortsteile.geojson"
    - "ortsteil_wahlkreis.csv"
    - "wahlkreise_abgrenzung.pdf"
  notes: "Downloads the official Ortsteile WFS + Berlin Wahlkreis PDF, copies the tracked Ortsteil mapping, then builds Wahlkreis polygons deterministically."

columns:
  wk_nr: wk_nr
  wk_name: wk_name
